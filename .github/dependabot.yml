version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      go-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"