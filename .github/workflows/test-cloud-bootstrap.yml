name: Test Cloud Bootstrap
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-cloud-bootstrap
  cancel-in-progress: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-coolify

      - name: Test API
        run: |
          set -euo pipefail
          echo "=== ENV FILE ==="
          cat /tmp/coolify-env
          echo "=== API TEST ==="
          set -a; source /tmp/coolify-env; set +a
          curl -v -H "Authorization: Bearer $COOLIFY_TOKEN" -H "Accept: application/json" "$COOLIFY_ENDPOINT/api/v1/version"
          echo ""
          curl -s -H "Authorization: Bearer $COOLIFY_TOKEN" -H "Accept: application/json" "$COOLIFY_ENDPOINT/api/v1/servers" | head -200