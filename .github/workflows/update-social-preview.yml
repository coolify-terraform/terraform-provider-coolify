name: Update Social Preview

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: update-social-preview
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update:
    name: Update Stats
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Use App token so the PR triggers CI and auto-approve
      # (GITHUB_TOKEN suppresses pull_request events).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.AUTO_APPROVE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Count stats from source code
        id: stats
        run: |
          RESOURCES=$(grep -rl 'func New.*Resource()' internal/service/ --include='*.go' \
            | grep -v data_source | sort -u | wc -l | tr -d ' ')
          DATASOURCES=$(grep -rl 'func New.*DataSource()' internal/service/ --include='*.go' \
            | sort -u | wc -l | tr -d ' ')
          RAW_TESTS=$(grep -rc 'func Test' --include='*_test.go' . \
            | awk -F: '{s+=$2}END{print s}')
          TESTS=$(python3 -c "print((${RAW_TESTS}//50)*50)")

          {
            echo "resources=$RESOURCES"
            echo "datasources=$DATASOURCES"
            echo "tests=${TESTS}+"
            echo "raw_tests=$RAW_TESTS"
          } >> "$GITHUB_OUTPUT"

          echo "Resources: $RESOURCES"
          echo "Data Sources: $DATASOURCES"
          echo "Tests: ${TESTS}+ (raw: $RAW_TESTS)"

      - name: Update SVG with live stats
        env:
          RESOURCES: ${{ steps.stats.outputs.resources }}
          DATASOURCES: ${{ steps.stats.outputs.datasources }}
          TESTS: ${{ steps.stats.outputs.tests }}
        run: |
          sed -i "s/>[0-9]\+ Resources</>${RESOURCES} Resources</" assets/social-preview.svg
          sed -i "s/>[0-9]\+ Data Sources</>${DATASOURCES} Data Sources</" assets/social-preview.svg
          sed -i "s/>[0-9]\+[+]* Tests</>${TESTS} Tests</" assets/social-preview.svg

      - name: Render SVG to PNG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 1280 -h 640 assets/social-preview.svg -o assets/social-preview.png

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet assets/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No stat changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Stats changed, will create PR"
            git diff --stat assets/
          fi

      - name: Update repo description
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RESOURCES: ${{ steps.stats.outputs.resources }}
          DATASOURCES: ${{ steps.stats.outputs.datasources }}
          TESTS: ${{ steps.stats.outputs.tests }}
        run: |
          NEW="Terraform provider for Coolify — manage ${RESOURCES} resources, ${DATASOURCES} data sources, ${TESTS} tests. Self-hosted PaaS as code."
          CURRENT=$(gh repo view --json description --jq '.description')
          if [ "$NEW" != "$CURRENT" ]; then
            gh repo edit --description "$NEW"
            echo "Updated repo description"
          else
            echo "Repo description already current"
          fi

      - name: Create PR with updated stats
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TESTS: ${{ steps.stats.outputs.tests }}
        run: |
          BRANCH="chore/update-social-preview-stats"
          # Clean up any leftover branch from a previous run
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git config user.name "coolify-terraform-auto-approve[bot]"
          git config user.email "coolify-terraform-auto-approve[bot]@users.noreply.github.com"
          git add assets/social-preview.svg assets/social-preview.png
          git commit -m "chore: update social preview stats to ${TESTS} tests"
          git push origin "$BRANCH"
          BODY="Auto-update stats in the social preview image and repo description."
          BODY="${BODY}\n\nThe social preview image on GitHub must be re-uploaded manually after"
          BODY="${BODY}\nmerging (Settings > Social preview > Edit > Upload). GitHub has no API"
          BODY="${BODY}\nfor social preview upload.\n\nRef #530"
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore: update social preview stats" \
            --body "$(echo -e "$BODY")")
          gh pr merge "$PR_URL" --auto --squash

      - name: Create upload reminder issue
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RESOURCES: ${{ steps.stats.outputs.resources }}
          DATASOURCES: ${{ steps.stats.outputs.datasources }}
          TESTS: ${{ steps.stats.outputs.tests }}
        run: |
          # Close any previous reminder issue
          gh issue list --label social-preview --state open --json number --jq '.[].number' \
            | while read -r num; do
                gh issue close "$num" --comment "Superseded by new release."
              done

          BODY=$(cat <<'ISSUE_BODY'
          ## Upload social preview image

          The social preview stats PR has been created and will auto-merge shortly.
          Once merged, upload the updated image to GitHub (no API exists for this).

          ### Quick path (Playwright, ~10 seconds)

          ```bash
          # 1. Launch Chrome with CDP (handles singleton locks and wait-for-ready)
          CHROME_CDP_URL="https://github.com/login" \
            source ~/.grok/skills/playwright-best-practices/scripts/start-chrome-cdp.sh

          # 2. Sign in to GitHub in the Chrome window (skip if already signed in)

          # 3. Pull the latest image and run the upload script
          cd ~/terraform-provider-coolify
          git pull origin main
          python3 scripts/upload-social-preview.py
          ```

          > **Skill reference:** `~/.grok/skills/github-web-admin/SKILL.md`
          > (section "Automating social preview updates in CI")

          ### Manual path (~30 seconds)

          1. Go to [repo settings](https://github.com/coolify-terraform/terraform-provider-coolify/settings)
          2. Scroll to **Social preview**
          3. Click **Edit** > **Upload an image...**
          4. Select `assets/social-preview.png` from your local checkout (after `git pull`)
          5. Done

          ### Verify

          Share the repo URL in a Discord/Slack DM to yourself. The preview card should show the updated stats.

          ISSUE_BODY
          )
          # Append current stats outside the heredoc to expand variables
          BODY="${BODY}
          **Current stats:** ${RESOURCES} resources, ${DATASOURCES} data sources, ${TESTS} tests"

          gh issue create \
            --title "Upload social preview image" \
            --label social-preview \
            --body "$BODY"