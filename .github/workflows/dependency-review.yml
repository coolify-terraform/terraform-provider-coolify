# Dependency Review - checks PRs for vulnerable or license-incompatible dependencies.
# Requires the repository to be public (GitHub Advanced Security).
# Enable when the repository is made public: uncomment the pull_request
# trigger and remove the workflow_dispatch-only trigger.
name: Dependency Review

on:
  # TODO(public): uncomment this trigger when the repo is public
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0
          comment-summary-in-pr: always
