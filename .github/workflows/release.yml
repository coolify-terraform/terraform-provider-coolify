name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0) -- only for manual re-runs"
        required: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    name: Release
    needs: release-please
    # always() required: release-please is skipped on workflow_dispatch
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name || github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - name: Verify tag is on main
        run: |
          if ! git branch -r --contains HEAD | grep -q 'origin/main'; then
            echo "::error::Tag does not point to a commit on main branch"
            exit 1
          fi
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit ${SHA:0:7}..."
          for attempt in $(seq 1 30); do
            CONCLUSION=$(gh run list \
              --commit "$SHA" \
              --workflow ci.yml \
              --status completed \
              --json conclusion \
              --jq '.[0].conclusion // empty')
            if [ "$CONCLUSION" = "success" ]; then
              echo "CI passed (attempt $attempt)"
              exit 0
            fi
            if [ -n "$CONCLUSION" ]; then
              echo "::error::CI workflow conclusion is '${CONCLUSION}', refusing to release"
              exit 1
            fi
            echo "No completed CI run found yet (attempt $attempt/30), waiting 30s..."
            sleep 30
          done
          echo "::error::No completed CI run for $SHA after 15 minutes. CI may still be running or was never triggered."
          exit 1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Smoke test
        run: GOFIPS140=latest go build ./...
      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> 2"
          args: check
      - name: Clean existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          for asset in $(gh release view "$TAG" --json assets \
              --jq '.assets[].name' 2>/dev/null || true); do
            echo "Deleting existing asset: $asset"
            gh release delete-asset "$TAG" "$asset" -y || true
          done
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}