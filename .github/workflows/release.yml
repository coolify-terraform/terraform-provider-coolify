name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify tag is on main
        run: |
          if ! git branch -r --contains HEAD | grep -q 'origin/main'; then
            echo "::error::Tag does not point to a commit on main branch"
            exit 1
          fi
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          CONCLUSION=$(gh run list \
            --commit "$SHA" \
            --workflow ci.yml \
            --status completed \
            --json conclusion \
            --jq '.[0].conclusion // empty')
          if [ -z "$CONCLUSION" ]; then
            echo "::error::No completed CI run found for commit $SHA. Wait for CI to finish."
            exit 1
          fi
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI workflow conclusion is '${CONCLUSION}', refusing to release"
            exit 1
          fi
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Smoke test
        run: go build ./...
      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> 2"
          args: check
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}