# Runs on GitHub-hosted runners (ubuntu-latest). To switch back to
# self-hosted runners, see git history before this commit for the
# full self-hosted config (fork safety guards, PATH normalization,
# Docker credential workarounds, python3.9 pinning, cache: false).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC (security scanners)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'schedule'
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      terraform: ${{ steps.filter.outputs.terraform }}
      ci: ${{ steps.filter.outputs.ci }}
      scripts: ${{ steps.filter.outputs.scripts }}
      scenarios: ${{ steps.filter.outputs.scenarios }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'testdata/**'
            docs:
              - 'templates/**'
              - 'docs/**'
              - '*.md'
            terraform:
              - 'examples/**/*.tf'
            ci:
              - '.github/workflows/ci.yml'
              - '.codecov.yml'
              - '.goreleaser.yml'
              - 'GNUmakefile'
            scripts:
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            scenarios:
              - 'examples/scenarios/**'
              - '.github/workflows/ci.yml'

  dco:
    name: DCO
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          for sha in $(git rev-list --no-merges "${BASE_SHA}"..HEAD); do
            author=$(git log -1 --format='%an' "$sha")
            if [[ "$author" == *"[bot]" ]]; then
              echo "Skipping bot commit $sha by $author"
              continue
            fi
            if ! git log -1 --format='%B' "$sha" | grep -qi '^Signed-off-by:'; then
              echo "::error::Commit $sha by $author is missing Signed-off-by"
              exit 1
            fi
          done
          echo "All commits have DCO sign-off"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      code-quality: write
    needs: changes
    if: >-
      always() &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests
        run: |
          mkdir -p test-results
          gotestsum \
            --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails \
            --rerun-fails-max-failures=5 \
            --packages ./... \
            -- -race -cover -coverprofile=coverage.out -count=1 -p 4 -parallel=1 -timeout=15m
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Convert coverage to Cobertura XML
        run: |
          go install github.com/boumenot/gocover-cobertura@v1.5.0
          gocover-cobertura < coverage.out > coverage.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14
      - name: Upload coverage
        if: >-
          always() &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: coverage.xml
          language: Go
          label: code-coverage/go

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: >-
      always() &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
      - name: Check go mod tidy
        if: ${{ !cancelled() }}
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Verify module checksums
        if: ${{ !cancelled() }}
        run: go mod verify
      - name: Govulncheck
        if: ${{ !cancelled() }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
      - name: GoReleaser check
        if: ${{ !cancelled() && (needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch') }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> 2"
          args: check

  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: >-
      always() &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.docs == 'true' ||
        needs.changes.outputs.terraform == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        needs.changes.outputs.scripts == 'true' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false
      - name: Check HCL formatting
        if: ${{ !cancelled() }}
        run: terraform fmt -check -recursive examples/
      - name: Check HCL formatting (OpenTofu)
        if: ${{ !cancelled() }}
        run: tofu fmt -check -recursive examples/
      - name: Check generated docs
        if: ${{ !cancelled() }}
        run: |
          cd tools && go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.25.0 && cd ..
          go generate ./...
          git diff --exit-code
      - name: API Coverage doc
        if: ${{ !cancelled() }}
        run: make api-coverage && git diff --exit-code API_COVERAGE.md
      - name: Verify AGENTS.md counts
        if: ${{ !cancelled() }}
        run: make counts-check
      - name: Install actionlint
        if: ${{ !cancelled() && (needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: GOBIN="$(pwd)/bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Lint GitHub Actions workflows
        if: ${{ !cancelled() && (needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: make actionlint-check
      - name: Run Python script tests
        if: ${{ !cancelled() && (needs.changes.outputs.scripts == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: |
          python3 --version
          make python-test
      - name: Trivy filesystem scan
        if: ${{ !cancelled() }}
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      - name: Retry Trivy with cached DB
        if: ${{ !cancelled() && steps.trivy.outcome == 'failure' }}
        run: |
          if trivy fs . --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --skip-db-update 2>/dev/null; then
            echo "::warning::Trivy DB download failed but scan passed with cached DB"
          else
            echo "::error::Trivy scan failed (tried fresh download and cached DB)"
            exit 1
          fi
      - name: Gitleaks
        if: ${{ !cancelled() }}
        env:
          GIT_BEFORE: ${{ github.event.before }}
          GIT_AFTER: ${{ github.event.after }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VER="8.30.1"
          BIN_DIR="$HOME/.local/bin"
          export PATH="$BIN_DIR:$PATH"
          mkdir -p "$BIN_DIR"
          if ! command -v gitleaks >/dev/null 2>&1 || ! gitleaks version 2>/dev/null | grep -q "$VER"; then
            OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            ARCH=$(uname -m)
            case "$ARCH" in x86_64) ARCH="x64" ;; aarch64|arm64) ARCH="arm64" ;; esac
            curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_${OS}_${ARCH}.tar.gz" \
              | tar xz -C "$BIN_DIR" gitleaks
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            gitleaks detect --source . --config .gitleaks.toml --log-opts="${PR_BASE_SHA}..HEAD" --exit-code 1
          elif [ "$EVENT_NAME" = "push" ]; then
            gitleaks detect --source . --config .gitleaks.toml --log-opts="${GIT_BEFORE}..${GIT_AFTER}" --exit-code 1
          else
            gitleaks detect --source . --config .gitleaks.toml --exit-code 1
          fi

  contract-freshness:
    name: Contract Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check for contract drift
        id: contract-check
        run: |
          git clone --depth 1 https://github.com/coollabsio/coolify.git /tmp/coolify-src
          python3 scripts/extract-contract.py /tmp/coolify-src \
            --version v4-latest \
            --output /tmp/coolify-latest-contract.json
          python3 -c "
          import json, sys
          with open('testdata/contracts/coolify-v4.json') as f:
              pinned = json.load(f)
          with open('/tmp/coolify-latest-contract.json') as f:
              latest = json.load(f)
          changes = []
          # Check model field drift
          for model in sorted(set(list(pinned.get('models', {})) + list(latest.get('models', {})))):
              pf = set(pinned.get('models', {}).get(model, {}).get('fields', {}).keys())
              lf = set(latest.get('models', {}).get(model, {}).get('fields', {}).keys())
              for f in sorted(lf - pf):
                  changes.append(f'+ {model}.{f}')
              for f in sorted(pf - lf):
                  changes.append(f'- {model}.{f}')
          # Check route drift
          pinned_routes = {(r['method'], r['path']) for r in pinned.get('routes', [])}
          latest_routes = {(r['method'], r['path']) for r in latest.get('routes', [])}
          for method, path in sorted(latest_routes - pinned_routes):
              changes.append(f'+ route {method} {path}')
          for method, path in sorted(pinned_routes - latest_routes):
              changes.append(f'- route {method} {path}')
          if changes:
              print(f'Contract drift: {len(changes)} changes')
              for c in changes[:50]:
                  print(f'  {c}')
              if len(changes) > 50:
                  print(f'  ... and {len(changes) - 50} more')
              sys.exit(1)
          print('Contract is up to date')
          " || echo "contract_drift=true" >> "$GITHUB_OUTPUT"
      - name: Create issue for contract drift
        if: steps.contract-check.outputs.contract_drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create contract-drift --description "Upstream Coolify source contract has changed" --color "d93f0b" --force 2>/dev/null || true
          EXISTING=$(gh issue list --label "contract-drift" --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "Upstream Coolify contract has changed" \
              --label "contract-drift" \
              --body "The weekly contract-freshness check detected field or route changes in the upstream Coolify source code. Run \`make contract-extract\` to update the pinned contract and review the changes with \`make contract-check\`."
          fi

  scenario-tests:
    name: Scenario Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes, test]
    if: >-
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (
        needs.changes.outputs.scenarios == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    env:
      COOLIFY_DATA_DIR: /home/runner/coolify-data
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"
      - name: Build and install provider locally
        run: |
          GOFIPS140=latest go build -o terraform-provider-coolify .
          PLUGIN_DIR="$HOME/.terraform.d/plugins/coolify-terraform/coolify/0.0.0-dev/$(go env GOOS)_$(go env GOARCH)"
          mkdir -p "$PLUGIN_DIR"
          cp terraform-provider-coolify "$PLUGIN_DIR/"
          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "coolify-terraform/coolify" = "$PLUGIN_DIR"
            }
            direct {}
          }
          EOF

      - name: Setup Coolify
        uses: ./.github/actions/setup-coolify

      - name: Generate deploy key for scenarios
        run: |
          rm -f /tmp/scenario-deploy-key /tmp/scenario-deploy-key.pub
          ssh-keygen -t rsa -b 2048 -f /tmp/scenario-deploy-key -N "" -q
          DEPLOY_KEY=$(cat /tmp/scenario-deploy-key)
          {
            echo "TF_VAR_deploy_ssh_key<<EOFKEY"
            echo "$DEPLOY_KEY"
            echo "EOFKEY"
            echo "TF_VAR_deploy_key<<EOFKEY2"
            echo "$DEPLOY_KEY"
            echo "EOFKEY2"
          } >> "$GITHUB_ENV"
      - name: Run scenario tests
        env:
          # GitHub App scenarios (acme-github-cicd)
          TF_VAR_github_app_private_key: ${{ secrets.COOLIFY_GITHUB_APP_PRIVATE_KEY }}
          TF_VAR_github_app_id: ${{ secrets.COOLIFY_GITHUB_APP_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.COOLIFY_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_client_id: ${{ secrets.COOLIFY_GITHUB_APP_CLIENT_ID }}
          TF_VAR_github_app_client_secret: ${{ secrets.COOLIFY_GITHUB_APP_CLIENT_SECRET }}
          TF_VAR_git_repository: ${{ secrets.COOLIFY_GITHUB_APP_REPOSITORY }}
          # Hetzner scenarios (acme-hetzner-infra)
          TF_VAR_hetzner_api_token: ${{ secrets.COOLIFY_HETZNER_TOKEN }}
        run: |
          # Load bootstrapped Coolify credentials
          set -a
          source /tmp/coolify-env
          set +a
          export TF_VAR_coolify_endpoint="$COOLIFY_ENDPOINT"
          export TF_VAR_coolify_token="$COOLIFY_TOKEN"
          export TF_VAR_server_uuid="$COOLIFY_SERVER_UUID"

          failed=0
          for dir in examples/scenarios/acme-*/; do
            scenario=$(basename "$dir")
            echo "=== Testing $scenario ==="

            # Skip scenarios with missing required secrets
            case "$scenario" in
              acme-github-cicd)
                if [ -z "$TF_VAR_github_app_id" ]; then
                  echo "SKIP: GitHub App secrets not configured"
                  echo ""
                  continue
                fi
                ;;
              acme-hetzner-infra)
                if [ -z "$TF_VAR_hetzner_api_token" ]; then
                  echo "SKIP: Hetzner token not configured"
                  echo ""
                  continue
                fi
                ;;
            esac

            (
              cd "$dir"
              if [ -d "modules" ]; then
                # terraform init still resolves providers with dev_overrides, so fetch only local modules here.
                terraform get
              fi
              terraform test -verbose
            ) || failed=1
            echo ""
          done
          exit $failed

      - name: Capture Coolify logs on failure
        if: failure()
        run: |
          docker compose -f "$COOLIFY_DATA_DIR/source/docker-compose.yml" \
            logs --timestamps > /tmp/coolify-logs.txt 2>&1 || true
      - name: Upload Coolify logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coolify-logs-scenario-tests
          path: /tmp/coolify-logs.txt
          retention-days: 7

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes, test, lint]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      needs.lint.result == 'success' &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        needs.changes.outputs.scripts == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    env:
      COOLIFY_DATA_DIR: /home/runner/coolify-data
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"

      - name: Setup Coolify
        uses: ./.github/actions/setup-coolify

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run acceptance tests
        env:
          # External secrets for tests that need real cloud APIs
          COOLIFY_HETZNER_TOKEN: ${{ secrets.COOLIFY_HETZNER_TOKEN }}
          COOLIFY_GITHUB_APP_APP_ID: ${{ secrets.COOLIFY_GITHUB_APP_APP_ID }}
          COOLIFY_GITHUB_APP_INSTALLATION_ID: ${{ secrets.COOLIFY_GITHUB_APP_INSTALLATION_ID }}
          COOLIFY_GITHUB_APP_CLIENT_ID: ${{ secrets.COOLIFY_GITHUB_APP_CLIENT_ID }}
          COOLIFY_GITHUB_APP_CLIENT_SECRET: ${{ secrets.COOLIFY_GITHUB_APP_CLIENT_SECRET }}
          COOLIFY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.COOLIFY_GITHUB_APP_PRIVATE_KEY }}
          COOLIFY_GITHUB_APP_PRIVATE_KEY_FILE: ${{ secrets.COOLIFY_GITHUB_APP_PRIVATE_KEY_FILE }}
          COOLIFY_GITHUB_APP_REPOSITORY: ${{ secrets.COOLIFY_GITHUB_APP_REPOSITORY }}
          COOLIFY_GITHUB_APP_BRANCH: ${{ secrets.COOLIFY_GITHUB_APP_BRANCH }}
        run: |
          # Load credentials from bootstrap
          set -a
          source /tmp/coolify-env
          set +a
          export TF_ACC=1

          mkdir -p test-results
          gotestsum \
            --format pkgname \
            --junitfile test-results/acceptance.xml \
            --packages ./internal/service/... \
            -- -run TestAcc -race -count=1 -timeout=30m -parallel=1
      - name: Upload acceptance test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: acceptance-test-results
          path: test-results/
          retention-days: 14

      - name: Capture Coolify logs on failure
        if: failure()
        run: |
          docker compose -f "$COOLIFY_DATA_DIR/source/docker-compose.yml" \
            logs --timestamps > /tmp/coolify-logs.txt 2>&1 || true
      - name: Upload Coolify logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coolify-logs-acceptance-tests
          path: /tmp/coolify-logs.txt
          retention-days: 7

  ci-pass:
    name: CI
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [dco, test, lint, validate, scenario-tests, acceptance-tests]
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "::error::One or more CI jobs failed"
            echo "$results"
            exit 1
          fi