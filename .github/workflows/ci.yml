name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC (security scanners)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: self-hosted
    timeout-minutes: 5
    if: github.event_name != 'schedule'
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      terraform: ${{ steps.filter.outputs.terraform }}
      ci: ${{ steps.filter.outputs.ci }}
      scripts: ${{ steps.filter.outputs.scripts }}
      scenarios: ${{ steps.filter.outputs.scenarios }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'testdata/**'
            docs:
              - 'templates/**'
              - 'docs/**'
              - '*.md'
            terraform:
              - 'examples/**/*.tf'
            ci:
              - '.github/workflows/ci.yml'
              - '.codecov.yml'
              - '.goreleaser.yml'
              - 'GNUmakefile'
            scripts:
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            scenarios:
              - 'examples/scenarios/**'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    runs-on: self-hosted
    timeout-minutes: 20
    needs: changes
    if: >-
      always() &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests
        run: |
          mkdir -p test-results
          gotestsum \
            --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails \
            --rerun-fails-max-failures=5 \
            --packages ./... \
            -- -race -cover -coverprofile=coverage.out -count=1 -p 4 -parallel=1 -timeout=15m
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: coverage.out
          fail_ci_if_error: false
          skip_validation: true  # gpg not available on self-hosted macOS runner
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 15
    needs: changes
    if: >-
      always() &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
      - name: Check go mod tidy
        if: ${{ !cancelled() }}
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Verify module checksums
        if: ${{ !cancelled() }}
        run: go mod verify
      - name: Govulncheck
        if: ${{ !cancelled() }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
      - name: GoReleaser check
        if: ${{ !cancelled() && (needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch') }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> 2"
          args: check

  validate:
    name: Validate
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      DOCKER_CONFIG: ${{ runner.temp }}/docker-ci-config
    needs: changes
    if: >-
      always() &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.docs == 'true' ||
        needs.changes.outputs.terraform == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        needs.changes.outputs.scripts == 'true' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"
      - name: Check HCL formatting
        if: ${{ !cancelled() }}
        run: terraform fmt -check -recursive examples/
      - name: Check generated docs
        if: ${{ !cancelled() }}
        run: |
          cd tools && go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs && cd ..
          go generate ./...
          git diff --exit-code
      - name: API Coverage doc
        if: ${{ !cancelled() }}
        run: make api-coverage && git diff --exit-code API_COVERAGE.md
      - name: Verify AGENTS.md counts
        if: ${{ !cancelled() }}
        run: make counts-check
      - name: Run Python script tests
        if: ${{ !cancelled() && (needs.changes.outputs.scripts == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: make python-test
      - name: Configure Docker for CI
        if: ${{ !cancelled() }}
        run: |
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"
      - name: Trivy filesystem scan
        if: ${{ !cancelled() }}
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      - name: Retry Trivy with cached DB
        if: ${{ !cancelled() && steps.trivy.outcome == 'failure' }}
        run: |
          if trivy fs . --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --skip-db-update 2>/dev/null; then
            echo "::warning::Trivy DB download failed but scan passed with cached DB"
          else
            echo "::error::Trivy scan failed (tried fresh download and cached DB)"
            exit 1
          fi
      - name: Gitleaks
        if: ${{ !cancelled() }}
        env:
          GIT_BEFORE: ${{ github.event.before }}
          GIT_AFTER: ${{ github.event.after }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VER="8.30.1"
          BIN_DIR="$HOME/.local/bin"
          export PATH="$BIN_DIR:$PATH"
          mkdir -p "$BIN_DIR"
          if ! command -v gitleaks >/dev/null 2>&1 || ! gitleaks version 2>/dev/null | grep -q "$VER"; then
            OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            ARCH=$(uname -m)
            case "$ARCH" in x86_64) ARCH="x64" ;; aarch64|arm64) ARCH="arm64" ;; esac
            curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_${OS}_${ARCH}.tar.gz" \
              | tar xz -C "$BIN_DIR" gitleaks
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            gitleaks detect --source . --config .gitleaks.toml --log-opts="${PR_BASE_SHA}..HEAD" --exit-code 1
          elif [ "$EVENT_NAME" = "push" ]; then
            gitleaks detect --source . --config .gitleaks.toml --log-opts="${GIT_BEFORE}..${GIT_AFTER}" --exit-code 1
          else
            gitleaks detect --source . --config .gitleaks.toml --exit-code 1
          fi

  spec-freshness:
    name: Spec Freshness
    runs-on: self-hosted
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check for upstream spec changes
        id: spec-check
        run: |
          curl -sL https://raw.githubusercontent.com/coollabsio/coolify/v4.x/openapi.json \
            -o /tmp/coolify-latest.json
          if ! diff -q testdata/specs/coolify-v4.original.json /tmp/coolify-latest.json > /dev/null 2>&1; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Coolify OpenAPI spec has changed upstream"
            diff testdata/specs/coolify-v4.original.json /tmp/coolify-latest.json | head -50
          else
            echo "Spec is up to date"
          fi
      - name: Create issue for spec drift
        if: steps.spec-check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure label exists (idempotent).
          gh label create spec-drift --description "Upstream Coolify OpenAPI spec has changed" --color "d93f0b" --force 2>/dev/null || true
          EXISTING=$(gh issue list --label "spec-drift" --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "Upstream Coolify OpenAPI spec has changed" \
              --label "spec-drift" \
              --body "The weekly spec-freshness check detected changes in the upstream Coolify OpenAPI spec. Run \`make spec-update\` to download the latest spec and review the diff."
          fi
      - name: Check for contract drift
        id: contract-check
        run: |
          git clone --depth 1 https://github.com/coollabsio/coolify.git /tmp/coolify-src
          python3 scripts/extract-contract.py /tmp/coolify-src \
            --version v4-latest \
            --output /tmp/coolify-latest-contract.json
          python3 -c "
          import json, sys
          with open('testdata/contracts/coolify-v4.json') as f:
              pinned = json.load(f)
          with open('/tmp/coolify-latest-contract.json') as f:
              latest = json.load(f)
          changes = []
          for model in sorted(set(list(pinned.get('models', {})) + list(latest.get('models', {})))):
              pf = set(pinned.get('models', {}).get(model, {}).get('fields', {}).keys())
              lf = set(latest.get('models', {}).get(model, {}).get('fields', {}).keys())
              for f in sorted(lf - pf):
                  changes.append(f'+ {model}.{f}')
              for f in sorted(pf - lf):
                  changes.append(f'- {model}.{f}')
          if changes:
              print(f'Contract drift: {len(changes)} field changes')
              for c in changes[:50]:
                  print(f'  {c}')
              if len(changes) > 50:
                  print(f'  ... and {len(changes) - 50} more')
              sys.exit(1)
          print('Contract is up to date')
          " || echo "contract_drift=true" >> "$GITHUB_OUTPUT"
      - name: Create issue for contract drift
        if: steps.contract-check.outputs.contract_drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create contract-drift --description "Upstream Coolify source contract has changed" --color "d93f0b" --force 2>/dev/null || true
          EXISTING=$(gh issue list --label "contract-drift" --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "Upstream Coolify contract has changed" \
              --label "contract-drift" \
              --body "The weekly contract-freshness check detected field changes in the upstream Coolify source code. Run \`make contract-extract\` to update the pinned contract and review the changes with \`make contract-check\`."
          fi

  scenario-tests:
    name: Scenario Tests
    runs-on: [self-hosted, macOS]
    timeout-minutes: 50
    needs: [changes, test]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (
        needs.changes.outputs.scenarios == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.15.x"
      - name: Build and install provider locally
        run: |
          go build -o terraform-provider-coolify .
          PLUGIN_DIR="$HOME/.terraform.d/plugins/coolify-terraform/coolify/0.0.0-dev/$(go env GOOS)_$(go env GOARCH)"
          mkdir -p "$PLUGIN_DIR"
          cp terraform-provider-coolify "$PLUGIN_DIR/"
          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "coolify-terraform/coolify" = "$PLUGIN_DIR"
            }
            direct {}
          }
          EOF
      - name: Check secrets configured
        id: secrets
        env:
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_SERVER_UUID: ${{ secrets.COOLIFY_SERVER_UUID }}
        run: |
          missing=0
          if [ -z "$COOLIFY_ENDPOINT" ]; then
            echo "::warning::Scenario tests skipped: COOLIFY_ENDPOINT secret not configured"
            missing=1
          fi
          if [ -z "$COOLIFY_TOKEN" ]; then
            echo "::warning::Scenario tests skipped: COOLIFY_TOKEN secret not configured"
            missing=1
          fi
          if [ -z "$COOLIFY_SERVER_UUID" ]; then
            echo "::warning::Scenario tests skipped: COOLIFY_SERVER_UUID secret not configured"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Health check
        id: health
        if: steps.secrets.outputs.configured == 'true'
        env:
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if curl -sf --connect-timeout 10 --max-time 30 -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_ENDPOINT/api/v1/version" > /dev/null 2>&1; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Coolify server not reachable but secrets are configured. Fix the test infrastructure."
            exit 1
          fi
      - name: Generate deploy key for scenarios
        if: steps.secrets.outputs.configured == 'true' && steps.health.outputs.healthy == 'true'
        run: |
          rm -f /tmp/scenario-deploy-key /tmp/scenario-deploy-key.pub
          ssh-keygen -t rsa -b 2048 -f /tmp/scenario-deploy-key -N "" -q
          echo "TF_VAR_deploy_key<<EOFKEY" >> "$GITHUB_ENV"
          cat /tmp/scenario-deploy-key >> "$GITHUB_ENV"
          echo "EOFKEY" >> "$GITHUB_ENV"
      - name: Run scenario tests
        if: steps.secrets.outputs.configured == 'true' && steps.health.outputs.healthy == 'true'
        env:
          TF_VAR_coolify_endpoint: ${{ secrets.COOLIFY_ENDPOINT }}
          TF_VAR_coolify_token: ${{ secrets.COOLIFY_TOKEN }}
          TF_VAR_server_uuid: ${{ secrets.COOLIFY_SERVER_UUID }}
        run: |
          failed=0
          for dir in examples/scenarios/acme-*/; do
            echo "=== Testing $(basename "$dir") ==="
            (
              cd "$dir"
              if [ -d "modules" ]; then
                # terraform init still resolves providers with dev_overrides, so fetch only local modules here.
                terraform get
              fi
              terraform test -verbose
            ) || failed=1
            echo ""
          done
          exit $failed

  acceptance-tests:
    name: Acceptance Tests
    runs-on: [self-hosted, macOS]
    timeout-minutes: 130
    needs: [changes, test]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (
        needs.changes.outputs.go == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Check secrets configured
        id: secrets
        env:
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          missing=0
          if [ -z "$COOLIFY_ENDPOINT" ]; then
            echo "::warning::Acceptance tests skipped: COOLIFY_ENDPOINT secret not configured"
            missing=1
          fi
          if [ -z "$COOLIFY_TOKEN" ]; then
            echo "::warning::Acceptance tests skipped: COOLIFY_TOKEN secret not configured"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Health check
        id: health
        if: steps.secrets.outputs.configured == 'true'
        env:
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if curl -sf --connect-timeout 10 --max-time 30 -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_ENDPOINT/api/v1/version" > /dev/null 2>&1; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Coolify server not reachable but secrets are configured. Fix the test infrastructure."
            exit 1
          fi
      - name: Run acceptance tests
        if: steps.secrets.outputs.configured == 'true' && steps.health.outputs.healthy == 'true'
        env:
          TF_ACC: "1"
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_SERVER_UUID: ${{ secrets.COOLIFY_SERVER_UUID }}
          COOLIFY_S3_STORAGE_UUID: ${{ secrets.COOLIFY_S3_STORAGE_UUID }}
          COOLIFY_HETZNER_TOKEN: ${{ secrets.COOLIFY_HETZNER_TOKEN }}
          COOLIFY_GITHUB_APP_APP_ID: ${{ secrets.COOLIFY_GITHUB_APP_APP_ID }}
          COOLIFY_GITHUB_APP_INSTALLATION_ID: ${{ secrets.COOLIFY_GITHUB_APP_INSTALLATION_ID }}
          COOLIFY_GITHUB_APP_CLIENT_ID: ${{ secrets.COOLIFY_GITHUB_APP_CLIENT_ID }}
          COOLIFY_GITHUB_APP_CLIENT_SECRET: ${{ secrets.COOLIFY_GITHUB_APP_CLIENT_SECRET }}
          COOLIFY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.COOLIFY_GITHUB_APP_PRIVATE_KEY }}
          COOLIFY_GITHUB_APP_PRIVATE_KEY_FILE: ${{ secrets.COOLIFY_GITHUB_APP_PRIVATE_KEY_FILE }}
          COOLIFY_GITHUB_APP_REPOSITORY: ${{ secrets.COOLIFY_GITHUB_APP_REPOSITORY }}
          COOLIFY_GITHUB_APP_BRANCH: ${{ secrets.COOLIFY_GITHUB_APP_BRANCH }}
        run: |
          go test -run TestAcc -race -count=1 -timeout=120m -p 1 -parallel=1 ./...

  ci-pass:
    name: CI
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [test, lint, validate, scenario-tests, acceptance-tests]
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "::error::One or more CI jobs failed"
            echo "$results"
            exit 1
          fi