name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC (security scanners)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: self-hosted
    timeout-minutes: 5
    if: github.event_name != 'schedule'
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      terraform: ${{ steps.filter.outputs.terraform }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
            docs:
              - 'templates/**'
              - 'docs/**'
              - '*.md'
            terraform:
              - 'examples/**/*.tf'
            ci:
              - '.github/workflows/ci.yml'
              - '.codecov.yml'
              - 'GNUmakefile'

  test:
    name: Test
    runs-on: self-hosted
    timeout-minutes: 15
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests
        run: |
          mkdir -p test-results
          gotestsum \
            --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails \
            --rerun-fails-max-failures=5 \
            --packages ./... \
            -- -race -cover -coverprofile=coverage.out -timeout=10m -parallel=10
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

  validate-examples:
    name: Validate Examples
    runs-on: self-hosted
    timeout-minutes: 5
    needs: changes
    if: always() && (needs.changes.outputs.terraform == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Check HCL formatting
        run: terraform fmt -check -recursive examples/

  govulncheck:
    name: Govulncheck
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Trivy
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  gitleaks:
    name: Gitleaks
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER="8.30.1"
          mkdir -p "$HOME/.local/bin"
          curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar xz -C "$HOME/.local/bin" gitleaks
      - name: Run gitleaks
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          gitleaks detect --source . --exit-code 1

  docs:
    name: Docs
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: cd tools && go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs
      - run: go generate ./...
      - run: git diff --exit-code
      - name: API Coverage doc
        run: make api-coverage && git diff --exit-code API_COVERAGE.md

  spec-freshness:
    name: Spec Freshness
    runs-on: self-hosted
    timeout-minutes: 5
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Check for upstream spec changes
        id: spec-check
        run: |
          curl -sL https://raw.githubusercontent.com/coollabsio/coolify/v4.x/openapi.json \
            -o /tmp/coolify-latest.json
          if ! diff -q testdata/specs/coolify-v4.json /tmp/coolify-latest.json > /dev/null 2>&1; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Coolify OpenAPI spec has changed upstream"
            diff testdata/specs/coolify-v4.json /tmp/coolify-latest.json | head -50
          else
            echo "Spec is up to date"
          fi
      - name: Create issue for spec drift
        if: steps.spec-check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "spec-drift" --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "Upstream Coolify OpenAPI spec has changed" \
              --label "spec-drift" \
              --body "The weekly spec-freshness check detected changes in the upstream Coolify OpenAPI spec. Run \`make spec-update\` to download the latest spec and review the diff."
          fi