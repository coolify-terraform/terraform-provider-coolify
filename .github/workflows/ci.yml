name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC (security scanners)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      terraform: ${{ steps.filter.outputs.terraform }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
            docs:
              - 'templates/**'
              - 'docs/**'
              - '*.md'
            terraform:
              - 'examples/**/*.tf'
            ci:
              - '.github/workflows/ci.yml'
              - '.codecov.yml'
              - 'GNUmakefile'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'push')
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Run tests
        run: |
          mkdir -p test-results
          gotestsum \
            --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails \
            --rerun-fails-max-failures=5 \
            -- -race -cover -coverprofile=coverage.out -timeout=10m -parallel=10 ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'push')
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'push')
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          gofmt -s -l . | tee fmt_output.txt
          test ! -s fmt_output.txt
      - run: go mod tidy && git diff --exit-code

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.outputs.terraform == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push')
    strategy:
      fail-fast: false
      matrix:
        terraform: ["1.6", "1.9", "latest"]
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - name: Check HCL formatting
        run: terraform fmt -check -recursive examples/

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'push')
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=$(curl -sL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --exit-code 1

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push')
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: cd tools && go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs
      - run: go generate ./...
      - run: git diff --exit-code