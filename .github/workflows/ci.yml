name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC (security scanners)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: self-hosted
    timeout-minutes: 5
    if: github.event_name != 'schedule'
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      terraform: ${{ steps.filter.outputs.terraform }}
      ci: ${{ steps.filter.outputs.ci }}
      scenarios: ${{ steps.filter.outputs.scenarios }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'testdata/**'
            docs:
              - 'templates/**'
              - 'docs/**'
              - '*.md'
            terraform:
              - 'examples/**/*.tf'
            ci:
              - '.github/workflows/ci.yml'
              - '.codecov.yml'
              - '.goreleaser.yml'
              - 'GNUmakefile'
            scenarios:
              - 'examples/scenarios/**'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    runs-on: self-hosted
    timeout-minutes: 15
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.12.x"
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests
        run: |
          mkdir -p test-results
          gotestsum \
            --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails \
            --rerun-fails-max-failures=5 \
            --packages ./... \
            -- -race -cover -coverprofile=coverage.out -count=1 -p 10 -timeout=10m -parallel=10
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.12.2
      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Verify module checksums
        run: go mod verify

  validate-examples:
    name: Validate Examples
    runs-on: self-hosted
    timeout-minutes: 5
    needs: changes
    if: always() && (needs.changes.outputs.terraform == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.12.x"
      - name: Check HCL formatting
        run: terraform fmt -check -recursive examples/

  govulncheck:
    name: Govulncheck
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Trivy
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      - name: Retry Trivy with cached DB
        if: steps.trivy.outcome == 'failure'
        run: |
          if trivy fs . --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --skip-db-update 2>/dev/null; then
            echo "::warning::Trivy DB download failed but scan passed with cached DB"
          else
            echo "::error::Trivy scan failed (tried fresh download and cached DB)"
            exit 1
          fi

  gitleaks:
    name: Gitleaks
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          VER="8.30.1"
          BIN_DIR="$HOME/.local/bin"
          export PATH="$BIN_DIR:$PATH"
          mkdir -p "$BIN_DIR"

          if ! command -v gitleaks >/dev/null 2>&1 || ! gitleaks version 2>/dev/null | grep -q "$VER"; then
            curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
              | tar xz -C "$BIN_DIR" gitleaks
          fi

          echo "$BIN_DIR" >> "$GITHUB_PATH"
      - name: Run gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --config .gitleaks.toml --log-opts="origin/main..HEAD" --exit-code 1
          elif [ "${{ github.event_name }}" = "push" ]; then
            gitleaks detect --source . --config .gitleaks.toml --log-opts="${{ github.event.before }}..${{ github.event.after }}" --exit-code 1
          else
            gitleaks detect --source . --config .gitleaks.toml --exit-code 1
          fi

  goreleaser-check:
    name: GoReleaser Check
    runs-on: self-hosted
    timeout-minutes: 5
    needs: changes
    if: always() && (needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "~> 2"
          args: check

  docs:
    name: Docs
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.12.x"
      - run: cd tools && go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs
      - run: go generate ./...
      - run: git diff --exit-code
      - name: API Coverage doc
        run: make api-coverage && git diff --exit-code API_COVERAGE.md
      - name: Verify AGENTS.md counts
        run: make counts-check

  spec-freshness:
    name: Spec Freshness
    runs-on: self-hosted
    timeout-minutes: 5
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check for upstream spec changes
        id: spec-check
        run: |
          curl -sL https://raw.githubusercontent.com/coollabsio/coolify/v4.x/openapi.json \
            -o /tmp/coolify-latest.json
          if ! diff -q testdata/specs/coolify-v4.json /tmp/coolify-latest.json > /dev/null 2>&1; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Coolify OpenAPI spec has changed upstream"
            diff testdata/specs/coolify-v4.json /tmp/coolify-latest.json | head -50
          else
            echo "Spec is up to date"
          fi
      - name: Create issue for spec drift
        if: steps.spec-check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "spec-drift" --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "Upstream Coolify OpenAPI spec has changed" \
              --label "spec-drift" \
              --body "The weekly spec-freshness check detected changes in the upstream Coolify OpenAPI spec. Run \`make spec-update\` to download the latest spec and review the diff."
          fi

  scenario-tests:
    name: Scenario Tests
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [changes, test]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (needs.changes.outputs.scenarios == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "1.12.x"
      - name: Build and install provider locally
        run: |
          go build -o terraform-provider-coolify .
          PLUGIN_DIR="$HOME/.terraform.d/plugins/SebTardifLabs/coolify/0.0.0-dev/linux_amd64"
          mkdir -p "$PLUGIN_DIR"
          cp terraform-provider-coolify "$PLUGIN_DIR/"
          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "SebTardifLabs/coolify" = "$PLUGIN_DIR"
            }
            direct {}
          }
          EOF
      - name: Check secrets configured
        id: secrets
        run: |
          if [ -z "${{ secrets.COOLIFY_ENDPOINT }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Scenario tests skipped: COOLIFY_ENDPOINT secret not configured"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Health check
        id: health
        if: steps.secrets.outputs.configured == 'true'
        env:
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if curl -sf -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_ENDPOINT/api/v1/version" > /dev/null 2>&1; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Coolify server not reachable, skipping scenario tests"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate deploy key for scenarios
        if: steps.secrets.outputs.configured == 'true' && steps.health.outputs.healthy == 'true'
        run: |
          rm -f /tmp/scenario-deploy-key /tmp/scenario-deploy-key.pub
          ssh-keygen -t rsa -b 2048 -f /tmp/scenario-deploy-key -N "" -q
          echo "TF_VAR_deploy_key<<EOFKEY" >> "$GITHUB_ENV"
          cat /tmp/scenario-deploy-key >> "$GITHUB_ENV"
          echo "EOFKEY" >> "$GITHUB_ENV"
      - name: Run scenario tests
        if: steps.secrets.outputs.configured == 'true' && steps.health.outputs.healthy == 'true'
        env:
          TF_VAR_coolify_endpoint: ${{ secrets.COOLIFY_ENDPOINT }}
          TF_VAR_coolify_token: ${{ secrets.COOLIFY_TOKEN }}
          TF_VAR_server_uuid: ${{ secrets.COOLIFY_SERVER_UUID }}
        run: |
          failed=0
          for dir in examples/scenarios/acme-*/; do
            echo "=== Testing $(basename "$dir") ==="
            (
              cd "$dir"
              if [ -d "modules" ]; then
                # terraform init still resolves providers with dev_overrides, so fetch only local modules here.
                terraform get
              fi
              terraform test -verbose
            ) || failed=1
            echo ""
          done
          exit $failed

  acceptance-tests:
    name: Acceptance Tests
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [changes, test]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Check secrets configured
        id: secrets
        run: |
          if [ -z "${{ secrets.COOLIFY_ENDPOINT }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Acceptance tests skipped: COOLIFY_ENDPOINT secret not configured"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Health check
        id: health
        if: steps.secrets.outputs.configured == 'true'
        env:
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if curl -sf -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_ENDPOINT/api/v1/version" > /dev/null 2>&1; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Coolify server not reachable, skipping acceptance tests"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run acceptance tests
        if: steps.secrets.outputs.configured == 'true' && steps.health.outputs.healthy == 'true'
        env:
          TF_ACC: "1"
          COOLIFY_ENDPOINT: ${{ secrets.COOLIFY_ENDPOINT }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_SERVER_UUID: ${{ secrets.COOLIFY_SERVER_UUID }}
        run: |
          go test -run TestAcc -race -count=1 -timeout=30m -p 4 ./...

  ci-pass:
    name: CI
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [test, lint, validate-examples, govulncheck, trivy, gitleaks, goreleaser-check, docs, scenario-tests, acceptance-tests]
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "::error::One or more CI jobs failed"
            echo "$results"
            exit 1
          fi