# WARNING: This single-container setup does NOT work for testing.
# Coolify requires PostgreSQL, Redis, and Soketi (4 services total).
#
# For a working local Coolify instance, follow the guide:
#   docs/guides/scenario-testing.md
#
# Or use the official multi-service installation:
#   https://coolify.io/docs/get-started/installation
#
# This file is kept only as a minimal reference. Do not use it directly.

services:
  coolify:
    image: ghcr.io/coollabsio/coolify:latest
    ports:
      - "8000:80"
    volumes:
      - coolify-data:/data/coolify
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - APP_ENV=production
    restart: unless-stopped

volumes:
  coolify-data: