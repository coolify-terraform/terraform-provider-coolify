version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - nilerr
    - unconvert
    - wastedassign
    - whitespace

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt