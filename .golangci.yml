version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - nilerr
    - unconvert
    - wastedassign
    - whitespace
    - funlen
    - godox
    - dupl
    - gocognit
    - nestif
    - forbidigo
    - gocritic
    - dupword

  settings:
    funlen:
      lines: 150
      statements: 80
    dupl:
      threshold: 250
    gocognit:
      min-complexity: 20
    nestif:
      min-complexity: 5
    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - XXX
    forbidigo:
      forbid:
        - pattern: fmt\.Print.*
          msg: "do not commit debug print statements"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
          - funlen
          - dupl
          - gocognit

formatters:
  enable:
    - gofmt